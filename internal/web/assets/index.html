<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>session-notes</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='2' width='28' height='28' rx='7' fill='%231C2226'/%3E%3Cpath d='M13 16h-5M19 16c3 0 3-6 7-6M19 16c3 0 3 6 7 6' fill='none' stroke='%238B9997' stroke-width='2.8' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='4.2' fill='%2346B3A4'/%3E%3Ccircle cx='7' cy='16' r='2.6' fill='%238ea3d8'/%3E%3Ccircle cx='26.5' cy='10' r='2.6' fill='%23e0a878'/%3E%3Ccircle cx='26.5' cy='22' r='2.6' fill='%23e0a878'/%3E%3C/svg%3E">
<style>
:root {
  --bg: #f7f7f5; --fg: #1a1a1a; --dim: #77776f; --card: #ffffff;
  --border: #e2e2dd; --accent: #4a7d5f; --urgent: #b3442e;
  --active: #3fae62; --idle: #c9a03c; --gone: #a0a09a;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16161a; --fg: #dcdcd4; --dim: #8a8a82; --card: #1f1f24;
    --border: #2e2e34; --accent: #7fbf9a; --urgent: #e07a5f;
    --active: #57c878; --idle: #d4b356; --gone: #5c5c60;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 1.5rem; background: var(--bg); color: var(--fg);
  font: 15px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
h1 { font-size: 1.05rem; font-weight: 600; margin: 0 0 1rem; }
h1 .dim { color: var(--dim); font-weight: 400; }
#cards { display: grid; gap: .75rem; grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr)); }
a.card {
  display: block; background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: .75rem .9rem; text-decoration: none; color: var(--fg);
}
a.card:hover, a.card.sel { border-color: var(--accent); }
.card .head { display: flex; align-items: baseline; gap: .5rem; }
.card .name { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card .ago { color: var(--dim); font-size: .85em; }
.dot { display: inline-block; width: .6em; height: .6em; border-radius: 50%; flex: none; }
.dot.active { background: var(--active); }
.dot.idle { background: var(--idle); }
.dot.gone { background: transparent; border: 1px solid var(--gone); }
.card ul { margin: .4rem 0 0; padding: 0; list-style: none; }
.card li { color: var(--dim); font-size: .9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card li.thread::before { content: "[>] "; color: var(--accent); }
.card li.urgent { color: var(--urgent); }
.card li.urgent::before { content: "!! "; }
.card .cwd { margin-top: .35rem; color: var(--dim); font-size: .8em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#empty { color: var(--dim); }
#err { background: var(--urgent); color: #fff; padding: .4rem .8rem; border-radius: 6px; margin-bottom: .75rem; font-size: .85em; }
#projfilter { font: inherit; font-size: .85em; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: .1rem .3rem; margin-left: .3rem; }
/* ---- mobile ---- */
@media (max-width: 640px) {
  body { padding: 1rem .8rem calc(1rem + env(safe-area-inset-bottom)); }
}
@media (pointer: coarse) {
  a.card { padding: .9rem 1rem; } /* roomier tap target */
  #projfilter { font-size: 16px; } /* stop iOS focus auto-zoom */
}
</style>
</head>
<body>
<h1>session dashboard <span class="dim" id="count"></span>
  <select id="projfilter" hidden></select></h1>
<div id="err" hidden></div>
<div id="cards"></div>
<p id="empty" hidden>No boards yet — start a Claude Code session with the session-notes hooks installed.</p>
<script>
const esc = s => { const d = document.createElement('span'); d.textContent = s; return d.innerHTML; };

let allBoards = [];
let projFilter = ''; // '' = all projects
let failCount = 0;   // consecutive /api/boards failures (item 43)

// The web dashboard keeps the all-boards overview (a served dashboard has no
// single "current cwd" like the TUI), but surfaces project scope: a distinct
// project count plus a client-side per-project filter (item 38).
function distinctProjects(boards) {
  return [...new Set(boards.map(b => b.cwd || '').filter(Boolean))].sort();
}
function renderFilter(projects) {
  const sel = document.getElementById('projfilter');
  sel.hidden = projects.length < 2;
  const want = ['', ...projects];
  const opts = want.map(p => `<option value="${esc(p)}"${p === projFilter ? ' selected' : ''}>${p ? esc(p) : 'all projects'}</option>`).join('');
  if (sel.innerHTML !== opts) sel.innerHTML = opts;
}

async function refresh() {
  let data;
  try {
    const r = await fetch('/api/boards');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    data = await r.json();
  } catch {
    // A single blip stays quiet; a sustained failure surfaces a banner (item 43).
    if (++failCount >= 3) {
      const e = document.getElementById('err');
      e.textContent = 'dashboard unavailable — retrying…';
      e.hidden = false;
    }
    return;
  }
  failCount = 0;
  document.getElementById('err').hidden = true;
  allBoards = data.boards || [];
  const projects = distinctProjects(allBoards);
  if (projFilter && !projects.includes(projFilter)) projFilter = '';
  renderFilter(projects);
  const boards = projFilter ? allBoards.filter(b => (b.cwd || '') === projFilter) : allBoards;
  const projLabel = projects.length ? ` · ${projects.length} project${projects.length === 1 ? '' : 's'}` : '';
  document.getElementById('count').textContent = allBoards.length ? `· ${allBoards.length} boards${projLabel}` : '';
  document.getElementById('empty').hidden = boards.length > 0;
  document.getElementById('cards').innerHTML = boards.map(b => `
    <a class="card" href="/b/${encodeURIComponent(b.id)}">
      <div class="head">
        <span class="dot ${b.liveness}"></span>
        <span class="name">${esc(b.name)}</span>
        <span class="ago">${esc(b.ago || '')}</span>
      </div>
      <ul>
        ${(b.threads || []).map(t => `<li class="thread">${esc(t)}</li>`).join('')}
        ${(b.urgent || []).map(u => `<li class="urgent">${esc(u)}</li>`).join('')}
        ${b.lastLog ? `<li>${esc(b.lastLog)}</li>` : ''}
      </ul>
      <div class="cwd">${esc(b.cwd || '')}</div>
    </a>`).join('');
}
document.getElementById('projfilter').addEventListener('change', e => {
  projFilter = e.target.value;
  if (selID) applySel();
  refresh();
});
refresh();
setInterval(() => refresh(), 2000);

// j/k/enter mirror the TUI dashboard; selection is remembered by board id
// so the 2s refresh doesn't drop it.
let selID = null;
function applySel() {
  const cards = [...document.querySelectorAll('a.card')];
  cards.forEach(c => c.classList.toggle('sel', c.href.endsWith('/b/' + encodeURIComponent(selID))));
}
document.addEventListener('keydown', e => {
  const cards = [...document.querySelectorAll('a.card')];
  if (!cards.length) return;
  const idx = cards.findIndex(c => c.classList.contains('sel'));
  if (e.key === 'j' || e.key === 'ArrowDown') {
    const n = cards[Math.min(cards.length - 1, idx < 0 ? 0 : idx + 1)];
    selID = decodeURIComponent(n.href.split('/b/').pop()); applySel(); n.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'k' || e.key === 'ArrowUp') {
    const n = cards[Math.max(0, idx < 0 ? 0 : idx - 1)];
    selID = decodeURIComponent(n.href.split('/b/').pop()); applySel(); n.scrollIntoView({ block: 'nearest' });
  } else if ((e.key === 'Enter' || e.key === 'l' || e.key === 'ArrowRight') && idx >= 0) {
    // enter / l / right open the selected card (vim-style, mirroring the TUI);
    // rescan is automatic every 2s, so there is no manual `r` key.
    location.href = cards[idx].href;
  }
});
const origRefresh = refresh;
refresh = async () => { await origRefresh(); if (selID) applySel(); };
</script>
</body>
</html>
