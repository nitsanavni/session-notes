name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build binaries
        run: |
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${target%/*} arch=${target#*/}
            out_dir="dist/${os}_${arch}"
            mkdir -p "$out_dir"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -trimpath -ldflags "-s -w -X main.version=$GITHUB_REF_NAME" -o "$out_dir/session-notes" .
            tar -C "$out_dir" -czf "dist/session-notes_${os}_${arch}.tar.gz" session-notes
          done
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.tar.gz dist/checksums.txt
