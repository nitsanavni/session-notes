# session-notes cloud server + litestream replication + Caddy TLS terminator.
#
# Bring up:   docker compose -f deploy/docker-compose.yml up -d --build
# The DB and Caddy state live on named volumes so they survive `down`/upgrades.
#
# Secrets come from a .env file next to this compose file (git-ignored). See
# deploy/README.md for the full runbook and the .env template.

services:
  # The application server. It writes to /data/server.db on the shared volume;
  # litestream (below) replicates that same file off-box.
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    stop_grace_period: 15s # let graceful shutdown drain SSE + close the DB
    volumes:
      - data:/data
    expose:
      - "7099"
    healthcheck:
      # distroless has no shell/curl, so probe via the binary itself is not
      # possible; Caddy + the litestream sidecar reach /healthz instead. Compose
      # restarts on process exit via restart: unless-stopped.
      disable: true

  # Litestream sidecar: streams /data/server.db to S3-compatible storage. It
  # shares the data volume read-only-ish (it needs the WAL) with the server.
  litestream:
    image: litestream/litestream:0.3
    restart: unless-stopped
    depends_on:
      - server
    volumes:
      - data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      LITESTREAM_BUCKET: ${LITESTREAM_BUCKET}
      LITESTREAM_PATH: ${LITESTREAM_PATH:-server.db}
      LITESTREAM_ENDPOINT: ${LITESTREAM_ENDPOINT}
      LITESTREAM_REGION: ${LITESTREAM_REGION}
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY}
    command: ["replicate", "-config", "/etc/litestream.yml"]

  # Caddy reverse proxy: automatic TLS via Let's Encrypt, proxies to the server.
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SN_DOMAIN: ${SN_DOMAIN}

volumes:
  data:
  caddy_data:
  caddy_config:
